name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: golangci-lint
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          skip-cache: true

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: go test -race -coverprofile=coverage-unit.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.out

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests against a containerized systemd
        run: make test-integration-docker

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.out

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Merge coverage profiles
        run: |
          { head -n1 coverage-unit.out; tail -n +2 coverage-unit.out; tail -n +2 coverage-integration.out; } > coverage.out
          go tool cover -func=coverage.out > func-coverage.txt
          total=$(tail -n1 func-coverage.txt | awk '{print $NF}')
          {
            echo "## Coverage: ${total}"
            echo
            echo "<details><summary>Per-function breakdown</summary>"
            echo
            echo '```'
            cat func-coverage.txt
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build binary
        run: go build -o bin/systemd-exporter ./cmd/systemd-exporter

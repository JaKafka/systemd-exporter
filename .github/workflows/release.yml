name: Release

on:
  release:
    types: [published]

jobs:
  release-build:
    name: build and upload binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w" \
            -o "bin/systemd-exporter-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/systemd-exporter

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: bin/systemd-exporter-${{ matrix.goos }}-${{ matrix.goarch }}
